apiVersion: apps/v1
kind: Deployment
metadata:
  name: lessonservice
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.lessonservice.replicas }}
  selector:
    matchLabels:
      app: lessonservice
  template:
    metadata:
      labels:
        app: lessonservice
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: lessonservice
        image: {{ .Values.lessonservice.image }}
        imagePullPolicy: {{ .Values.images.pullPolicy }}
        ports:
        - containerPort: {{ .Values.lessonservice.port }}
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__lessonserviceDb
          value: "Host={{ .Values.postgresql.host }};Port={{ .Values.postgresql.port }};Database=lessonservice_db;Username={{ .Values.postgresql.username }};Ssl Mode=Disable;"
        - name: Keycloak__Authority
          value: "{{ .Values.keycloak.url }}/realms/{{ .Values.keycloak.realm }}"
        - name: Keycloak__AdminUrl
          value: "{{ .Values.keycloak.url }}"
        - name: Keycloak__Realm
          value: "{{ .Values.keycloak.realm }}"
        - name: Keycloak__ClientId
          value: "{{ .Values.keycloak.clientId }}"
        - name: Keycloak__ClientSecret
          valueFrom:
            secretKeyRef:
              name: kidsproject-secrets
              key: keycloak-client-secret
        - name: Keycloak__Audience
          value: "account"
        - name: Keycloak__RequireHttpsMetadata
          value: "false"
        - name: Redis__ConnectionString
          value: "{{ .Values.redis.host }}:{{ .Values.redis.port }}"
        resources:
          requests:
            memory: {{ .Values.lessonservice.resources.requests.memory }}
            cpu: {{ .Values.lessonservice.resources.requests.cpu }}
          limits:
            memory: {{ .Values.lessonservice.resources.limits.memory }}
            cpu: {{ .Values.lessonservice.resources.limits.cpu }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.lessonservice.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.lessonservice.port }}
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lessonservice
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: lessonservice
  ports:
  - port: 80
    targetPort: {{ .Values.lessonservice.port }}
  type: ClusterIP