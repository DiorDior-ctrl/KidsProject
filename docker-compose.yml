services:
  postgres:
    image: postgres:16
    container_name: kidsproject-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: userservice_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: